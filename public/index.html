<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WinNAS - Personal Network Attached Storage Dashboard">
  <title>WinNAS - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-logo">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="8" width="40" height="12" rx="3" fill="url(#tgrad)" opacity="0.9"/>
          <rect x="4" y="24" width="40" height="12" rx="3" fill="url(#tgrad)" opacity="0.7"/>
          <circle cx="12" cy="14" r="2" fill="rgba(255,255,255,0.9)"/>
          <circle cx="12" cy="30" r="2" fill="rgba(255,255,255,0.9)"/>
          <defs>
            <linearGradient id="tgrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1"/>
              <stop offset="100%" style="stop-color:#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <span>WinNAS</span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="search-bar" id="searchBar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="파일 검색..." onkeydown="if(event.key==='Enter')performSearch()">
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" id="viewToggle" onclick="toggleView()" title="보기 전환">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="topbar-btn" id="uploadBtn" onclick="openUpload()" title="업로드">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17,8 12,3 7,8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
      <div class="topbar-divider"></div>
      <button class="topbar-btn notification-btn" id="notificationBtn" onclick="toggleNotifications()" title="알림">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
      </button>
      <button class="topbar-btn" onclick="openSettings()" title="설정">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <h3 class="sidebar-heading">드라이브</h3>
        <div id="driveList" class="drive-list">
          <!-- Drives loaded dynamically -->
        </div>
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-heading">필터</h3>
        <button class="sidebar-item" onclick="filterByType('all')" data-filter="all">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          </svg>
          <span>전체 파일</span>
        </button>
        <button class="sidebar-item" onclick="filterByType('image')" data-filter="image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21,15 16,10 5,21"/>
          </svg>
          <span>이미지</span>
        </button>
        <button class="sidebar-item" onclick="filterByType('video')" data-filter="video">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23,7 16,12 23,17 23,7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <span>영상</span>
        </button>
        <button class="sidebar-item" onclick="filterByType('document')" data-filter="document">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <span>문서</span>
        </button>
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-heading">관리</h3>
        <button class="sidebar-item" onclick="openDeviceManager()" id="deviceManagerBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span>기기 관리</span>
          <span class="pending-count" id="pendingCount" style="display: none;">0</span>
        </button>
        <button class="sidebar-item" onclick="openSettings()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09c-.658.003-1.25.396-1.51 1z"/>
          </svg>
          <span>설정</span>
        </button>
        <button class="sidebar-item logout" onclick="handleLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>로그아웃</span>
        </button>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Breadcrumb -->
    <div class="breadcrumb-bar" id="breadcrumbBar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="breadcrumb-right">
        <div class="sort-wrapper" id="sortWrapper">
          <button class="sort-btn" id="sortBtn" onclick="toggleSortDropdown()" title="정렬">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="4" y1="6" x2="20" y2="6"/>
              <line x1="4" y1="12" x2="14" y2="12"/>
              <line x1="4" y1="18" x2="8" y2="18"/>
            </svg>
            <span class="sort-label">이름 ↑</span>
          </button>
          <div class="sort-dropdown" id="sortDropdown">
            <button class="sort-option" onclick="changeSort('name')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
              이름순
            </button>
            <button class="sort-option" onclick="changeSort('size')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="14" width="6" height="8" rx="1"/><rect x="14" y="4" width="6" height="18" rx="1"/></svg>
              크기순
            </button>
            <button class="sort-option" onclick="changeSort('modified')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
              수정일순
            </button>
            <button class="sort-option" onclick="changeSort('type')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13,2 13,9 20,9"/></svg>
              종류순
            </button>
          </div>
        </div>
        <div class="content-info" id="contentInfo"></div>
      </div>
    </div>

    <!-- File Grid/List -->
    <div class="file-container" id="fileContainer">
      <div class="file-grid" id="fileGrid">
        <!-- Files loaded dynamically -->
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <p>파일이 없습니다</p>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
      <div class="loading-spinner">
        <div class="spinner large"></div>
        <p>로딩 중...</p>
      </div>
    </div>
  </main>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal" style="display: none;" onclick="if(event.target===this)closeUpload()">
    <div class="modal">
      <div class="modal-header">
        <h2>파일 업로드</h2>
        <button class="modal-close" onclick="closeUpload()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="upload-zone" id="uploadZone"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleDrop(event)">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17,8 12,3 7,8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p>파일을 드래그하거나 클릭하여 선택</p>
          <input type="file" id="fileInput" multiple style="display: none" onchange="handleFileSelect(event)">
          <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">파일 선택</button>
        </div>
        <div class="upload-list" id="uploadList"></div>
        <div class="upload-progress" id="uploadProgress" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-text" id="progressText">0%</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeUpload()">취소</button>
        <button class="btn-primary" id="uploadSubmit" onclick="startUpload()" disabled>업로드</button>
      </div>
    </div>
  </div>

  <!-- Media Viewer Modal -->
  <div class="media-overlay" id="mediaOverlay" style="display: none;">
    <button class="media-close">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <button class="media-nav media-prev" id="mediaPrev">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15,18 9,12 15,6"/>
      </svg>
    </button>
    <button class="media-nav media-next" id="mediaNext">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9,18 15,12 9,6"/>
      </svg>
    </button>
    <div class="media-content" id="mediaContent"></div>
    <div class="media-info" id="mediaInfo"></div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display: none;" onclick="if(event.target===this)closeSettings()">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>설정</h2>
        <button class="modal-close" onclick="closeSettings()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-tabs">
          <button class="settings-tab active" onclick="switchSettingsTab('password', this)">비밀번호 변경</button>
          <button class="settings-tab" onclick="switchSettingsTab('devices', this)">기기 관리</button>
        </div>

        <!-- Password Tab -->
        <div class="settings-content" id="tab-password">
          <form onsubmit="changePassword(event)">
            <div class="form-group">
              <label>현재 비밀번호</label>
              <input type="password" id="currentPassword" required>
            </div>
            <div class="form-group">
              <label>새 비밀번호 (8자 이상)</label>
              <input type="password" id="newPassword" required minlength="8">
            </div>
            <div class="form-group">
              <label>새 비밀번호 확인</label>
              <input type="password" id="confirmNewPassword" required minlength="8">
            </div>
            <button type="submit" class="btn-primary">변경</button>
          </form>
        </div>

        <!-- Devices Tab -->
        <div class="settings-content" id="tab-devices" style="display: none;">
          <div class="device-list-container" id="deviceListContainer">
            <!-- Loaded dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification Panel -->
  <div class="notification-panel" id="notificationPanel" style="display: none;">
    <div class="notification-header">
      <h3>알림</h3>
      <button onclick="closeNotifications()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="notification-list" id="notificationList">
      <p class="notification-empty">새 알림이 없습니다</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
  <script src="/js/fileManager.js"></script>
  <script src="/js/mediaViewer.js"></script>
</body>
</html>
