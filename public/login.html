<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WinNAS - Personal Network Attached Storage">
  <title>WinNAS - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-background">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
  </div>

  <div class="login-container" id="loginContainer">
    <!-- Login Form -->
    <div class="login-card" id="loginCard">
      <div class="login-logo">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="4" y="8" width="40" height="12" rx="3" fill="url(#grad1)" opacity="0.9"/>
            <rect x="4" y="24" width="40" height="12" rx="3" fill="url(#grad1)" opacity="0.7"/>
            <circle cx="12" cy="14" r="2" fill="rgba(255,255,255,0.9)"/>
            <circle cx="12" cy="30" r="2" fill="rgba(255,255,255,0.9)"/>
            <circle cx="18" cy="14" r="2" fill="rgba(255,255,255,0.5)"/>
            <circle cx="18" cy="30" r="2" fill="rgba(255,255,255,0.5)"/>
            <rect x="30" y="12" width="10" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
            <rect x="30" y="28" width="10" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6366f1"/>
                <stop offset="100%" style="stop-color:#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>WinNAS</h1>
        <p class="login-subtitle">Personal Cloud Storage</p>
      </div>

      <form id="loginForm" method="POST" action="javascript:void(0)">
        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            <button type="button" class="toggle-password">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group" id="deviceNameGroup" style="display: none;">
          <label for="deviceName">기기 이름</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <input type="text" id="deviceName" placeholder="이 기기의 이름 (예: 내 노트북)">
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">로그인</span>
          <span class="btn-loading" style="display: none;">
            <div class="spinner"></div>
          </span>
        </button>
      </form>

      <div class="login-message" id="loginMessage" style="display: none;"></div>
    </div>

    <!-- Device Pending Card -->
    <div class="login-card pending-card" id="pendingCard" style="display: none;">
      <div class="pending-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
      </div>
      <h2>기기 승인 대기</h2>
      <p>이미 등록된 기기에서 이 기기를 승인해주세요.</p>
      <p class="device-id-display" id="pendingDeviceId"></p>
      <button class="btn-secondary" id="retryBtn">다시 시도</button>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
